name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build windows-x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/usageguard-desktop/ui/package-lock.json

      - name: Install desktop UI dependencies
        run: npm ci --prefix crates/usageguard-desktop/ui

      - name: Build desktop UI
        run: npm run build --prefix crates/usageguard-desktop/ui

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --release -p usageguard-cli
          cargo build --release -p usageguard-desktop

      - name: Prepare artifacts (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/usageguard.exe dist/
          Copy-Item target/release/usageguard-desktop.exe dist/
          Compress-Archive -Path dist/usageguard.exe,dist/usageguard-desktop.exe -DestinationPath dist/usage-guard-windows-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: usage-guard-windows-x64
          path: dist/usage-guard-windows-x64.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact files
        run: |
          mkdir -p release-assets
          find dist -type f -name "*.zip" -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/SHA256SUMS
