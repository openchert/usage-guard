name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x64
            artifact_suffix: linux-x64
            cli_bin: usageguard
            desktop_bin: usageguard-desktop
            archive_ext: tar.gz
          - os: windows-latest
            target_name: windows-x64
            artifact_suffix: windows-x64
            cli_bin: usageguard.exe
            desktop_bin: usageguard-desktop.exe
            archive_ext: zip
          - os: macos-latest
            target_name: macos-arm64
            artifact_suffix: macos-arm64
            cli_bin: usageguard
            desktop_bin: usageguard-desktop
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps (desktop)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxrandr-dev libxcursor-dev \
            libxinerama-dev libgl1-mesa-dev libasound2-dev libudev-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: |
          cargo build --release -p usageguard-cli
          cargo build --release -p usageguard-desktop

      - name: Prepare artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.cli_bin }} dist/
          cp target/release/${{ matrix.desktop_bin }} dist/
          chmod +x dist/${{ matrix.cli_bin }} dist/${{ matrix.desktop_bin }}
          tar -czf dist/usage-guard-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }} -C dist ${{ matrix.cli_bin }} ${{ matrix.desktop_bin }}

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/${{ matrix.cli_bin }} dist/
          Copy-Item target/release/${{ matrix.desktop_bin }} dist/
          Compress-Archive -Path dist/${{ matrix.cli_bin }},dist/${{ matrix.desktop_bin }} -DestinationPath dist/usage-guard-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }} -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: usage-guard-${{ matrix.artifact_suffix }}
          path: dist/usage-guard-${{ matrix.artifact_suffix }}.${{ matrix.archive_ext }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact files
        run: |
          mkdir -p release-assets
          find dist -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum *.zip *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
            release-assets/SHA256SUMS
